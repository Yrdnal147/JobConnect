name: jobconnect
description: AI-powered student-company matching platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management & DI
  flutter_bloc: ^8.1.4
  get_it: ^7.6.7
  injectable: ^2.3.2
  equatable: ^2.0.5

  # Navigation
  go_router: ^13.2.0

  # Supabase
  supabase_flutter: ^2.3.4

  # HTTP (pour appeler Mastra)
  dio: ^5.4.3

  # UI
  google_fonts: ^6.2.1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  

  # File & document
  file_picker: ^8.0.3
  image_picker: ^1.0.7
  flutter_pdfview: ^1.3.2
  url_launcher: ^6.2.5

  # Maps
  flutter_map: ^6.1.0
  latlong2: ^0.9.0

  # Auth
  google_sign_in: ^6.2.1
  flutter_secure_storage: ^9.0.0

  # Notifications
  firebase_core: ^2.27.1
  firebase_messaging: ^14.7.20

  # Utils
  dartz: ^0.10.1
  intl: ^0.20.2
  shared_preferences: ^2.2.3
  uuid: ^4.4.0
  flutter_dotenv: ^5.1.0
  sidebarx: ^0.17.2
  easy_localization: ^3.0.7
  flutter_native_splash: ^2.4.7
  flutter_advanced_drawer: ^1.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.9
  injectable_generator: ^2.4.1
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1
  
flutter_icons:
  android: true
  ios: true
  image_path: "assets/images/JobConnect.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/
    - assets/translations/